<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes - Communications</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Channels</h2>
            </div>
            
            <div class="channel-list">
                <div class="channel active"># general</div>
                <div class="channel"># games</div>
                <div class="channel"># dev-logs</div>
            </div>

            <div id="admin-section" style="display: none;">
                <h3 style="color: #ff4444; font-size: 12px; margin-bottom: 8px; text-align: center;">ADMIN PANEL</h3>
                <input type="text" id="admin-target-user" placeholder="Target Username...">
                <div style="display: flex; gap: 4px;">
                    <button class="admin-btn btn-warn" onclick="adminAction('warn')">Warn</button>
                    <button class="admin-btn btn-ban" onclick="adminAction('ban')">Ban</button>
                    <button class="admin-btn btn-tag" onclick="adminAction('tag')">Tag</button>
                </div>
            </div>

            <div class="user-profile">
                <div class="avatar"></div>
                <span id="username-display"></span>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <span class="channel-name"># general</span>
            </div>
            
            <div id="chat-messages" class="messages-container">
                <div class="message system">Welcome to the encrypted comms.</div>
            </div>

            <form id="chat-form" class="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script type="module" src="chat.js"></script>
</body>
</html>
