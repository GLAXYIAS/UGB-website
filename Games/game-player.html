<script type="module">
    // 1. Get the Cloak from storage
    const savedCloak = localStorage.getItem('savedCloak');
    const defaultTitle = "Null_X";

    // 2. Map of Cloak names to their Titles
    const cloakTitles = {
        "Google Classroom": "Classes",
        "Google Drive": "My Drive - Google Drive",
        "none": defaultTitle
    };

    // 3. Force the title immediately
    function lockTitle() {
        const title = cloakTitles[savedCloak] || defaultTitle;
        document.title = title;
    }

    // Run it once on load
    lockTitle();

    // 4. (Optional) Prevent the game's index.html from changing it via the iframe
    // This runs every second to "correct" any changes the game tries to make
    setInterval(lockTitle, 1000);
</script>
