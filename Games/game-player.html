<script type="module">
    // --- 1. THE NUCLEAR STEALTH LOCK (Keep your existing lock code here) ---
    const currentTitle = localStorage.getItem('cloakTitle') || "Null_X";
    const currentIcon = localStorage.getItem('cloakIcon') || "../imgs/favicon.png";
    document.title = currentTitle;
    try { Object.defineProperty(document, 'title', { value: currentTitle, writable: false }); } catch (e) {}

    // --- 2. UNIVERSAL LOADING LOGIC ---
    const urlParams = new URLSearchParams(window.location.search);
    const folderName = urlParams.get('folder'); // It pulls the folder name from the URL
    const iframe = document.getElementById('game-frame');

    if (folderName) {
        // Automatically loads: folder/index.html
        iframe.src = `${folderName}/index.html`;
    } else {
        window.location.href = "../index.html";
    }
</script>
